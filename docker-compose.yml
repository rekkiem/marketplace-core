version: "3.9"

services:
  db:
    image: postgres:16
    container_name: ferrehub-db
    restart: always
    environment:
      POSTGRES_DB: ferrehub
      POSTGRES_USER: ferrehub
      POSTGRES_PASSWORD: ferrehub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ferrehub-redis
    restart: always
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: ferrehub-web
    restart: always
    depends_on:
      - db
      - redis
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    command: npm run dev

volumes:
  pgdata:
